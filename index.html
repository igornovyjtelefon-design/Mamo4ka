<!DOCTYPE html>
<html>
<head>
    <title>Для мамы с любовью 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 10;
            max-width: 600px;
            margin: 20px;
        }
        
        h1 {
            color: #ff4757;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .message {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
            margin: 30px 0;
        }
        
        button {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s;
            margin: 10px;
        }
        
        button:hover {
            transform: scale(1.1);
        }
        
        .heart {
            position: fixed;
            font-size: 20px;
            pointer-events: none;
            animation: float 3s ease-in-out forwards;
            z-index: 1000;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .emoji {
            font-size: 4em;
            animation: bounce 1s infinite;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🌸</div>
        <h1>Дорогая мамочка! 💖</h1>
        <div class="message">
            Ты — самый дорогой человек в моей жизни.<br>
            Спасибо тебе за всё:<br>
            🌟 За твою любовь<br>
            🌟 За твою заботу<br>
            🌟 За твоё терпение<br>
            🌟 За твою поддержку
        </div>
        <button onclick="createHearts()">💝 Нажми на меня 💝</button>
        <button onclick="showPoem()">📖 Стихи для мамы</button>
        <div id="poem" style="margin-top: 20px; font-style: italic; color: #666;"></div>
    </div>
    
    <script>
        function createHearts() {
            for(let i = 0; i < 50; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '🌸', '🌹'][Math.floor(Math.random() * 7)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 30 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 3000);
            }
            alert('Я тебя очень сильно люблю! ❤️');
        }
        
        function showPoem() {
            const poemDiv = document.getElementById('poem');
            poemDiv.innerHTML = `
                <br><br>
                🌸 Мамочка любимая, родная,<br>
                Ты у меня одна на свете.<br>
                Тебя я очень обожаю,<br>
                Ты лучше всех на всей планете! 🌸<br><br>
                💖 Спасибо за тепло и ласку,<br>
                За каждый день и каждый час.<br>
                Ты для меня, как в доброй сказке,<br>
                Я очень, очень люблю тебя! 💖
            `;
            poemDiv.style.opacity = '0';
            poemDiv.style.transition = 'opacity 1s';
            poemDiv.style.opacity = '1';
        }
        
        // Автоматически создать несколько сердечек при загрузке
        setTimeout(() => {
            for(let i = 0; i < 20; i++) {
                setTimeout(() => createHearts(), i * 100);
            }
        }, 500);
    </script>
</body>
</html>
